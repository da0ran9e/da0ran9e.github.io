<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VŨ ĐỨC AN — TERRAIN MAP</title>
<meta name="description" content="Bản đồ địa hình procedural — cuộn để đi, zoom vào để địa hình nổi lên. Three.js." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#0c1014; --paper:#eef2f4; --accent:#37c2a3; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',Helvetica,Arial,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;color:var(--paper);
    background:linear-gradient(180deg,#cfe6e2 0%,#aacbc6 55%,#8fb3ad 100%)}
  #gl{position:fixed;inset:0;display:block;cursor:grab}
  #gl:active{cursor:grabbing}

  .ui{position:fixed;inset:0;z-index:5;pointer-events:none;color:var(--ink)}
  .top{position:absolute;top:24px;left:28px;right:28px;display:flex;justify-content:space-between;
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700}
  .top .r{color:var(--accent)}
  a.back{position:absolute;left:28px;top:46px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#3a5852;text-decoration:none;pointer-events:auto}
  a.back:hover{color:var(--ink)}
  .title{position:absolute;left:28px;bottom:78px;font-weight:900;letter-spacing:-.03em;line-height:.88;
    font-size:clamp(34px,7vw,84px);text-transform:uppercase;color:#fff;text-shadow:0 2px 20px rgba(20,50,45,.3)}
  .sub{position:absolute;left:30px;bottom:54px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#2c4a44}
  .hint{position:absolute;right:28px;bottom:54px;font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:#2c4a44;text-align:right}
  .zoom{position:absolute;right:28px;top:70px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#2c4a44;text-align:right}
  .zoom b{color:var(--accent)}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="ui">
  <div class="top"><span>Vũ Đức An · Lab</span><span class="r">Three.js · Procedural</span></div>
  <a class="back" href="/#apps">← apps</a>
  <h1 class="title">Terrain<br>Map</h1>
  <div class="sub">Địa hình procedural · cuộn vô tận</div>
  <div class="hint">Kéo để cuộn · cuộn chuột để zoom</div>
  <div class="zoom">Độ nổi địa hình: <b id="lvl">0%</b></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from "three"
import { MapControls } from "three/addons/controls/MapControls.js"

const canvas = document.getElementById("gl")
const lvlEl = document.getElementById("lvl")

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.setSize(innerWidth, innerHeight)
renderer.setClearColor(0x000000, 0)

const scene = new THREE.Scene()
scene.fog = new THREE.Fog(0x9fc2bb, 600, 1300)
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 1, 4000)
camera.position.set(0, 320, 280)

const controls = new MapControls(camera, canvas)
controls.enableDamping = true
controls.dampingFactor = 0.08
controls.minDistance = 70
controls.maxDistance = 900
controls.maxPolarAngle = Math.PI / 2.15
controls.target.set(0, 0, 0)

// ---- terrain shader (procedural, không cần texture) ----
const SIZE = 1200, SEG = 360
const geo = new THREE.PlaneGeometry(SIZE, SIZE, SEG, SEG)
geo.rotateX(-Math.PI / 2)

const uniforms = {
  uHeightScale: { value: 0 },
  uOffset: { value: new THREE.Vector2(0, 0) },
  uFreq: { value: 0.0016 },
  uLight: { value: new THREE.Vector3(0.5, 0.8, 0.35).normalize() },
  uContour: { value: 1 },
}

const vert = `
  uniform float uHeightScale;
  uniform vec2 uOffset;
  uniform float uFreq;
  varying float vH;
  varying vec3 vN;

  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float vnoise(vec2 p){
    vec2 i=floor(p), f=fract(p);
    float a=hash(i), b=hash(i+vec2(1.,0.)), c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));
    vec2 u=f*f*(3.-2.*f);
    return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
  }
  float fbm(vec2 p){
    float v=0., a=0.5;
    for(int i=0;i<6;i++){ v+=a*vnoise(p); p*=2.03; a*=0.5; }
    return v;
  }
  float terr(vec2 w){ float h=fbm(w*uFreq); h=pow(h,1.3); return h; }

  void main(){
    vec2 w = position.xz + uOffset;
    float h = terr(w);
    vH = h;
    // pháp tuyến từ sai phân
    float e = 2.5;
    float hl=terr(w+vec2(-e,0.)), hr=terr(w+vec2(e,0.));
    float hd=terr(w+vec2(0.,-e)), hu=terr(w+vec2(0.,e));
    vN = normalize(vec3((hl-hr)*uHeightScale, 2.0*e, (hd-hu)*uHeightScale));
    vec3 p = position;
    p.y = h * uHeightScale;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);
  }
`
const frag = `
  precision highp float;
  uniform vec3 uLight;
  uniform float uContour;
  varying float vH;
  varying vec3 vN;

  vec3 ramp(float h){
    vec3 c;
    if(h<0.30) c=mix(vec3(0.17,0.40,0.55), vec3(0.42,0.60,0.42), smoothstep(0.0,0.30,h));
    else if(h<0.52) c=mix(vec3(0.42,0.60,0.42), vec3(0.80,0.74,0.46), smoothstep(0.30,0.52,h));
    else if(h<0.74) c=mix(vec3(0.80,0.74,0.46), vec3(0.55,0.42,0.32), smoothstep(0.52,0.74,h));
    else c=mix(vec3(0.55,0.42,0.32), vec3(0.96,0.97,0.99), smoothstep(0.74,1.0,h));
    return c;
  }
  void main(){
    vec3 col = ramp(vH);
    float diff = clamp(dot(normalize(vN), uLight), 0.0, 1.0);
    col *= (0.42 + 0.72*diff);
    // đường bình độ (mờ dần khi địa hình nổi lên)
    float band = abs(fract(vH*18.0)-0.5);
    float line = smoothstep(0.46,0.5,band);
    col = mix(col, col*0.78, line*0.5*uContour);
    gl_FragColor = vec4(col,1.0);
  }
`
const mat = new THREE.ShaderMaterial({ uniforms, vertexShader: vert, fragmentShader: frag })
const terrain = new THREE.Mesh(geo, mat)
scene.add(terrain)

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

// độ nổi địa hình theo mức zoom
const MAXH = 140
let curScale = 0
function tick() {
  controls.update()
  // plane bám theo target -> cuộn vô tận
  terrain.position.x = controls.target.x
  terrain.position.z = controls.target.z
  uniforms.uOffset.value.set(controls.target.x, controls.target.z)

  const dist = camera.position.distanceTo(controls.target)
  // xa -> phẳng (0), gần -> nổi cao (MAXH)
  const t = 1.0 - THREE.MathUtils.clamp((dist - controls.minDistance) / (700 - controls.minDistance), 0, 1)
  const targetScale = t * t * MAXH
  curScale += (targetScale - curScale) * 0.08
  uniforms.uHeightScale.value = curScale
  uniforms.uContour.value = 1.0 - THREE.MathUtils.clamp(curScale / MAXH, 0, 1) * 0.7
  lvlEl.textContent = Math.round((curScale / MAXH) * 100) + "%"

  renderer.render(scene, camera)
  requestAnimationFrame(tick)
}
tick()
</script>
</body>
</html>
